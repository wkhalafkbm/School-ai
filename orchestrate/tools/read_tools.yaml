openapi: 3.1.0
info:
  title: University AI — Orchestrate Read Tools
  version: 1.0.0
paths:
  /api/students/{student_id}:
    get:
      tags:
      - students
      summary: Get student profile
      description: 'Returns core profile fields for a student: name, program, status,
        GPA, year level, admission term, and nationality.'
      operationId: get_student_profile_api_students__student_id__get
      parameters:
      - name: student_id
        in: path
        required: true
        schema:
          type: string
          title: Student Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/students/{student_id}/academic-history:
    get:
      tags:
      - students
      summary: Get applicant academic history
      description: Returns the student's full enrollment history including course
        names, semesters, grades, and status.
      operationId: get_academic_history_api_students__student_id__academic_history_get
      parameters:
      - name: student_id
        in: path
        required: true
        schema:
          type: string
          title: Student Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/students/{student_id}/sponsorship:
    get:
      tags:

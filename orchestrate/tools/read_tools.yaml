    get:
      tags:
      - courses
      summary: Get SLO assessments
      description: Returns SLO assessment records for a course including proficiency
        rates, average scores, and number of students assessed per SLO.
      operationId: get_slo_assessments_api_courses__course_id__slo_assessments_get
      parameters:
      - name: course_id
        in: path
        required: true
        schema:
          type: string
          title: Course Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/courses/{course_id}/availability:
    get:
      tags:
      - courses
      summary: Get course availability
      description: Returns scheduled sections for a course with capacity, current

  /api/mentors:
    get:
      tags:
      - alumni
      summary: Get mentor pool
      description: Returns all available alumni mentors with their current role, company,
        industry, mentoring capacity, and availability status.
      operationId: get_mentor_pool_api_mentors_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/alumni/mentors:
    get:
      tags:
      - alumni
      summary: Get alumni mentors
      description: Returns all alumni who are available as mentors, with graduation
        year, current role, company, and mentoring capacity.
      operationId: get_alumni_mentors_api_alumni_mentors_get
      responses:
        '200':

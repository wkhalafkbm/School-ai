      description: Returns graduate outcome data including industry breakdown and
        individual alumni career trajectories.
      operationId: get_graduate_outcomes_api_alumni_outcomes_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}

      tags:
      - courses
      summary: Get course SLO performance
      description: Returns per-SLO performance summary for a course including proficiency
        rate and total students assessed.
      operationId: get_course_slo_performance_api_courses__course_id__slo_performance_get
      parameters:
      - name: course_id

    get:
      tags:
      - alumni
      summary: Get internship options
      description: Returns available internship opportunities derived from student
        career pathways, including target company, industry, and recommended semester.
      operationId: get_internship_options_api_internships_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
components:
  schemas:
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    RecommendationRequest:
      properties:
        entity_id:
          type: string
          title: Entity Id
        entity_type:
          type: string
          enum:
          - student
          - cohort
          title: Entity Type
        action:
          type: string
          title: Action
      type: object
      required:
      - entity_id
      - entity_type
      - action
      title: RecommendationRequest
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    WorkflowItemCreate:
      properties:
        stage:
          type: string
          title: Stage
        trigger:
          type: string
          title: Trigger
        owner_name:
          type: string
          title: Owner Name
        owner_role:
          type: string
          title: Owner Role
        status:
          type: string
          title: Status
        due_date:
          anyOf:
          - type: string
            format: date
          - type: 'null'
          title: Due Date
        description:
          type: string
          title: Description
        student_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Student Id
      type: object
      required:
      - stage
      - trigger
      - owner_name
      - owner_role
      - status
      - description
      title: WorkflowItemCreate
    WorkflowItemPatch:
      properties:
        status:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
        due_date:
          anyOf:
          - type: string
            format: date
          - type: 'null'
          title: Due Date
      type: object
      title: WorkflowItemPatch
    WorkflowItemResponse:
      properties:
        id:
          type: string
          title: Id
        stage:
          anyOf:
          - type: string
          - type: 'null'
          title: Stage
        trigger:
          anyOf:
          - type: string
          - type: 'null'
          title: Trigger
        owner_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Owner Name
        owner_role:
          anyOf:
          - type: string
          - type: 'null'
          title: Owner Role
        status:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
        due_date:
          anyOf:
          - type: string
            format: date
          - type: 'null'
          title: Due Date
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        student_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Student Id
      type: object
      required:
      - id
      - stage
      - trigger
      - owner_name
      - owner_role
      - status
      - due_date
      - description
      - student_id
      title: WorkflowItemResponse

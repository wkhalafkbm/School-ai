    get:
      tags:
      - cohorts
      summary: Get cohort SLO results
      description: Returns SLO proficiency history across all courses in a program
        cohort, aggregated by course and semester.
      operationId: get_cohort_slo_results_api_cohorts__cohort_id__slo_results_get
      parameters:
      - name: cohort_id
        in: path
        required: true
        schema:
          type: string
          title: Cohort Id
      responses:
